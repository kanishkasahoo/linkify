services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: linkify
      POSTGRES_USER: linkify
      POSTGRES_PASSWORD: linkify
    expose:
      - "5432"
    volumes:
      - linkify-postgres:/var/lib/postgresql/data
    networks:
      - default
      - dokploy-network

volumes:
  linkify-postgres:

networks:
  dokploy-network:
    external: true
