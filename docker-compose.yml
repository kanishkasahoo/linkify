services:
  app:
    build: .
    depends_on:
      - postgres
    environment:
      NODE_ENV: production
      SESSION_SECRET: ${SESSION_SECRET:-local-development-session-secret-change-me}
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID:-}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET:-}
      AUTH_GITHUB_REDIRECT_URI: ${AUTH_GITHUB_REDIRECT_URI:-http://localhost:3000/auth/github/callback}
      AUTHORIZED_GITHUB_ID: ${AUTHORIZED_GITHUB_ID:-}
      POSTGRES_URL: postgres://linkify:linkify@postgres:5432/linkify
      POSTGRES_URL_NON_POOLING: postgres://linkify:linkify@postgres:5432/linkify
      APP_URL: ${APP_URL:-http://localhost:3000}
    expose:
      - "3000"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: linkify
      POSTGRES_USER: linkify
      POSTGRES_PASSWORD: linkify
    expose:
      - "5432"
    volumes:
      - linkify-postgres:/var/lib/postgresql/data

volumes:
  linkify-postgres:
